version: '3.8'

services:
  database:
    image: mysql:8.0
    container_name: register_form_learn_and_grow_database_production
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./register_form_learn_and_grow_database_production/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - nbtc_register_form_learn_and_grow_learngrow-network

  backend:
    build: ./register_form_learn_and_grow_backend
    ports:
      - "0.0.0.0:5000:5000"
    environment:
      DB_HOST: database
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      AD_API_URL: ${AD_API_URL}
      AD_API_KEY: ${AD_API_KEY}
      NODE_OPTIONS: "--max-old-space-size=300"
      LOG_PATH: ${LOG_PATH}
    networks:
      - nbtc_register_form_learn_and_grow_learngrow-network
    mem_limit: 500M  # Add this line
    restart: always  # Auto-restart if crashes
    volumes:
      - ./backend-logs:/app/logs

    # ========== NEW PHP BACKEND (Replacement for main backend) ==========
  backend_php:
    build: ./register_form_learn_and_grow_backend_php
    ports:
      - "0.0.0.0:8000:8000"
    environment:
      APP_ENV: production
      DB_HOST: database
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      AD_API_URL: ${AD_API_URL}
      AD_API_KEY: ${AD_API_KEY}
      LOG_PATH: /var/www/html/logs
      TWOFACTOR_SPEAKEASY_SECRET_STR: ${TWOFACTOR_SPEAKEASY_SECRET_STR}
    networks:
      - nbtc_register_form_learn_and_grow_learngrow-network
    mem_limit: 500M
    restart: always
    depends_on:
      - database

  frontend:
    build: ./register_form_learn_and_grow_frontend
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      VITE_API_URL: ${VITE_API_URL}
    networks:
      - nbtc_register_form_learn_and_grow_learngrow-network
    mem_limit: 300M  # Add this line
    restart: always

  backup:
    image: alpine:latest
    container_name: register_learn_and_grow_backup
    restart: unless-stopped
    volumes:
      - mysql_data:/var/lib/mysql:ro
      - ./backups:/backups
      - ./backup-script.sh:/backup-script.sh:ro
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - DB_NAME=${DB_NAME}
      - MYSQL_HOST=database
    command: sh /backup-script.sh
    depends_on:
      - database
    networks:
      - nbtc_register_form_learn_and_grow_learngrow-network

  backend_onenbtc:
    build: ./one_nbtc_ui_backend
    ports:
      - "0.0.0.0:5001:5001"
    environment:
      DB_HOST: database
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      AD_API_URL: ${AD_API_URL}
      AD_API_KEY: ${AD_API_KEY}
      NODE_OPTIONS: "--max-old-space-size=300"
      LOG_PATH: ${LOG_PATH}
    networks:
      - nbtc_register_form_learn_and_grow_learngrow-network
    mem_limit: 500M  # Add this line
    restart: always  # Auto-restart if crashes
    volumes:
      - ./backend-logs:/app/logs

    # ========== NEW PHP BACKEND (Replacement for one_nbtc backend) ==========
  backend_php_onenbtc:
    build: ./one_nbtc_ui_backend_php
    ports:
      - "0.0.0.0:8001:8001"
    environment:
      APP_ENV: production
      DB_HOST: database
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      AD_API_URL: ${AD_API_URL}
      AD_API_KEY: ${AD_API_KEY}
      LOG_PATH: /var/www/html/logs
      TWOFACTOR_SPEAKEASY_SECRET_STR: ${TWOFACTOR_SPEAKEASY_SECRET_STR}
    networks:
      - nbtc_register_form_learn_and_grow_learngrow-network
    mem_limit: 500M
    restart: always
    depends_on:
      - database

  frontend_onenbtc:
    build: ./one_nbtc_ui_frontend
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      VITE_API_URL: ${VITE_API_URL_ONENBTC}
    networks:
      - nbtc_register_form_learn_and_grow_learngrow-network
    mem_limit: 300M  # Add this line
    restart: always

volumes:
  mysql_data:

networks:
  nbtc_register_form_learn_and_grow_learngrow-network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.25.0.0/24 #VPN fix
          gateway: 10.25.0.1


#can change 25 to any of 0 to 255
#172.x.x.x are in use, avoid them
